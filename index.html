<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Network Provider List Download</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #1f2937;
        }

        .description {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #374151;
        }

        select {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            margin-bottom: 20px;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        #message {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
            min-height: 20px;
        }

        .success {
            color: #15803d;
        }

        .error {
            color: #dc2626;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Provider Network List</h1>

        <p class="description">
            Select your insured network below to download the corresponding
            provider network list.
        </p>

        <label for="networkSelect">Select Network</label>

        <select id="networkSelect">
            <option value="">-- Select your network --</option>

            <option value="GN-PLUS.xlsx">GN PLUS</option>
            <option value="GN.xlsx">GN</option>
            <option value="RNE.xlsx">RNE</option>
            <option value="RN.xlsx">RN</option>
            <option value="RN2.xlsx">RN2</option>
            <option value="RN3.xlsx">RN3</option>
            <option value="PCP.xlsx">PCP</option>
            <option value="PCP-C.xlsx">PCP-C</option>
            <option value="PCP-AUH.xlsx">PCP-AUH</option>
            <option value="PCP-DENTAL.xlsx">PCP DENTAL</option>
            <option value="SEHA-PROVIDERS.xlsx">SEHA PROVIDERS</option>
            <option value="TPA-PHM.xlsx">TPA-PHM</option>
            <option value="REGIONAL.xlsx">REGIONAL</option>
            <option value="ADNIC-NETWORK-ONLY.xlsx">
                ADNIC NETWORK ONLY
            </option>
        </select>

        <button id="downloadButton" disabled>
            Download Network File
        </button>

        <p id="message"></p>

    </div>


    <script>
        const networkSelect =
            document.getElementById("networkSelect");

        const downloadButton =
            document.getElementById("downloadButton");

        const message =
            document.getElementById("message");


        networkSelect.addEventListener("change", function () {

            message.textContent = "";
            message.className = "";

            if (networkSelect.value !== "") {
                downloadButton.disabled = false;
            } else {
                downloadButton.disabled = true;
            }

        });


        downloadButton.addEventListener("click", function () {

            const selectedFile = networkSelect.value;

            if (!selectedFile) {

                message.textContent =
                    "Please select a network first.";

                message.className = "error";

                return;
            }


            const filePath =
                "networks/" + selectedFile;


            const downloadLink =
                document.createElement("a");

            downloadLink.href = filePath;

            downloadLink.download = selectedFile;

            document.body.appendChild(downloadLink);

            downloadLink.click();

            document.body.removeChild(downloadLink);


            message.textContent =
                "Your download has started.";

            message.className = "success";

        });
    </script>
    <script>
    const networkSelect = document.getElementById("networkSelect");
    const downloadButton = document.getElementById("downloadButton");
    const message = document.getElementById("message");

    networkSelect.addEventListener("change", function () {
        message.textContent = "";
        message.className = "";

        downloadButton.disabled = !networkSelect.value;
    });

    downloadButton.addEventListener("click", async function () {
        const selectedFile = networkSelect.value;

        if (!selectedFile) {
            message.textContent = "Please select a network first.";
            message.className = "error";
            return;
        }

        const filePath = `./networks/${encodeURIComponent(selectedFile)}`;

        try {
            const response = await fetch(filePath, { method: "HEAD" });

            if (!response.ok) {
                throw new Error("File not found");
            }

            const downloadLink = document.createElement("a");
            downloadLink.href = filePath;
            downloadLink.download = selectedFile;

            document.body.appendChild(downloadLink);
            downloadLink.click();
            downloadLink.remove();

            message.textContent = "Your download has started.";
            message.className = "success";

        } catch (error) {
            message.textContent =
                "The selected network file could not be found.";
            message.className = "error";
        }
    });
</script>

</body>
</html>
