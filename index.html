<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Insurance Network Provider List</title>

   

</head>
    <link rel="stylesheet" href="style.css">


<body>


    <main class="container">


        <h1>
            Provider Network List
        </h1>


        <p class="description">

            Select your insurance company and network
            to download the corresponding provider list.

        </p>



        <!-- INSURANCE COMPANY -->


        <div class="form-group">


            <label for="companySearch">

                Insurance Company

            </label>


            <input
                type="text"
                id="companySearch"
                class="search-input"
                placeholder="Search insurance company..."
                autocomplete="off"
            >


            <select id="companySelect">


                <option value="">

                    -- Select insurance company --

                </option>


            </select>


        </div>



        <!-- NETWORK -->


        <div class="form-group">


            <label for="networkSearch">

                Insurance Network

            </label>


            <input
                type="text"
                id="networkSearch"
                class="search-input"
                placeholder="Search network..."
                autocomplete="off"
            >


            <select id="networkSelect">


                <option value="">

                    -- Select network --

                </option>


            </select>


        </div>



        <!-- SELECTED INFORMATION -->


        <div
            class="selected-info"
            id="selectedInfo"
        >


            <p>

                <strong>Company:</strong>

                <span id="selectedCompany">
                    -
                </span>

            </p>


            <p>

                <strong>Network:</strong>

                <span id="selectedNetwork">
                    -
                </span>

            </p>


        </div>



        <!-- DOWNLOAD BUTTON -->


        <button
            id="downloadButton"
            disabled
        >

            Download Network File

        </button>


        <p id="message"></p>


    </main>



    <script src="script.js"></script>


</body>

</html>
